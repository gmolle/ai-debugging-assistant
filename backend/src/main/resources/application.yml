server:
  port: ${PORT:8080}

spring:
  application:
    name: ai-debugging-assistant
  datasource:
    url: jdbc:postgresql://localhost:5432/aiddebugging
    username: aiddebug
    password: aiddebug
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

app:
  openai:
    api-key: ${OPENAI_API_KEY:}
    model: gpt-4o-mini
    max-attempts: 2
    response-timeout: 10s
  analysis:
    persist-results: true
  cors:
    allowed-origins: http://localhost:5173

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true

# Set in environment (never commit):
# OPENAI_API_KEY=
