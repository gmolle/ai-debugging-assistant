# In-memory DB when Docker / Postgres is not available (npm run dev:offline)
spring:
  datasource:
    url: jdbc:h2:mem:aidlocal;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false
