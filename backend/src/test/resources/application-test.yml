spring:
  datasource:
    url: jdbc:h2:mem:aidtest;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false

app:
  openai:
    max-attempts: 2
    response-timeout: 10s
  cors:
    allowed-origins: http://localhost:5173
